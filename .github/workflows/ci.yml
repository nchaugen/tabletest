name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-build-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-build-
      - name: Build and test
        run: mvn install -q
      - name: Upload tabletest artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest

  java17-compatibility:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java17-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java17-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Run compatibility tests
        run: TEST_GROUPS="basic frameworks" ./test-compatibility.sh

  java8-compatibility:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java8-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java8-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Run basic-java8 compatibility tests
        run: TEST_GROUPS="basic-java8" ./test-compatibility.sh
