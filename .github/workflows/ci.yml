name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-build-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-build-
      - name: Build
        run: mvn install -Dmaven.test.skip=true -q
      - name: Upload tabletest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest

  compat-minimum:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java17-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java17-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v4
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Run minimum compatibility tests
        run: |
          TEST_GROUPS="basic frameworks" \
          JUNIT_VERSIONS="5.11.0" \
          QUARKUS_VERSIONS="3.21.2" \
          SPRINGBOOT_VERSIONS="3.0.0" \
          ./test-compatibility.sh

  compat-latest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java17-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java17-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v4
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Load latest versions
        run: cat compatibility-tests/latest-versions.env >> $GITHUB_ENV
      - name: Run latest compatibility tests
        run: |
          TEST_GROUPS="basic frameworks" \
          JUNIT_VERSIONS="$JUNIT_LATEST" \
          QUARKUS_VERSIONS="$QUARKUS_LATEST" \
          SPRINGBOOT_VERSIONS="$SPRINGBOOT_LATEST" \
          ./test-compatibility.sh
