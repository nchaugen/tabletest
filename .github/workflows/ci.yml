name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-build-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-build-
      - name: Build and test
        run: mvn install -q
      - name: Upload tabletest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest

  compat-minimum:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java17-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java17-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Load versions
        run: cat compatibility-tests/latest-versions.env >> $GITHUB_ENV
      - name: Run minimum compatibility tests
        run: |
          TEST_GROUPS="basic frameworks" \
          JUNIT_VERSIONS="$JUNIT_MIN" \
          QUARKUS_VERSIONS="$QUARKUS_MIN" \
          SPRINGBOOT_VERSIONS="$SPRINGBOOT_MIN" \
          ./test-compatibility.sh

  compat-latest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Maven repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-java17-${{ hashFiles('compatibility-tests/**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-java17-
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Load versions
        run: cat compatibility-tests/latest-versions.env >> $GITHUB_ENV
      - name: Run latest compatibility tests
        run: |
          TEST_GROUPS="basic frameworks" \
          JUNIT_VERSIONS="$JUNIT_LATEST" \
          QUARKUS_VERSIONS="$QUARKUS_LATEST" \
          SPRINGBOOT_VERSIONS="$SPRINGBOOT_LATEST" \
          ./test-compatibility.sh

  java8-minimum:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Load versions
        run: cat compatibility-tests/latest-versions.env >> $GITHUB_ENV
      - name: Run basic-java8 minimum tests
        run: |
          TEST_GROUPS="basic-java8" \
          JUNIT5_VERSIONS="$JUNIT_5_MIN" \
          QUARKUS_VERSIONS="" \
          SPRINGBOOT_VERSIONS="" \
          ./test-compatibility.sh

  java8-latest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Download tabletest artifacts
        uses: actions/download-artifact@v8
        with:
          name: tabletest-artifacts
          path: ~/.m2/repository/org/tabletest
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Load versions
        run: cat compatibility-tests/latest-versions.env >> $GITHUB_ENV
      - name: Run basic-java8 latest tests
        run: |
          TEST_GROUPS="basic-java8" \
          JUNIT5_VERSIONS="$JUNIT_5_LATEST" \
          QUARKUS_VERSIONS="" \
          SPRINGBOOT_VERSIONS="" \
          ./test-compatibility.sh
