name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.1)'
        required: true
        type: string
      modules:
        description: 'Which modules to release'
        required: true
        type: choice
        default: 'both'
        options:
          - both
          - parser-only
          - junit-only
      dry-run:
        description: 'Build and validate without deploying or pushing'
        required: false
        type: boolean
        default: false

env:
  VERSION: ${{ inputs.version }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-release-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-release-

      - name: Validate preconditions
        run: |
          # Validate semver pattern
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version '$VERSION' does not match semver pattern (e.g. 1.0.1)"
            exit 1
          fi

          # Validate changelog has unreleased content
          if [[ "${{ inputs.modules }}" != "junit-only" ]]; then
            PARSER_UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/p' tabletest-parser/CHANGELOG.md | sed '1d;$d')
            if [ -z "$PARSER_UNRELEASED" ]; then
              echo "::error::tabletest-parser/CHANGELOG.md has no content under [Unreleased]"
              exit 1
            fi
          fi

          MAIN_UNRELEASED=$(sed -n '/^## \[Unreleased\]/,/^## \[/p' CHANGELOG.md | sed '1d;$d')
          if [ -z "$MAIN_UNRELEASED" ]; then
            echo "::error::CHANGELOG.md has no content under [Unreleased]"
            exit 1
          fi

          # Validate tags do not already exist
          if [[ "${{ inputs.modules }}" != "junit-only" ]]; then
            if git tag -l "tabletest-parser-$VERSION" | grep -q .; then
              echo "::error::Tag tabletest-parser-$VERSION already exists"
              exit 1
            fi
          fi
          if [[ "${{ inputs.modules }}" != "parser-only" ]]; then
            if git tag -l "tabletest-junit-$VERSION" | grep -q .; then
              echo "::error::Tag tabletest-junit-$VERSION already exists"
              exit 1
            fi
          fi

          echo "All preconditions passed"

      - name: Set release versions in POMs
        run: |
          MODULES="${{ inputs.modules }}"

          if [[ "$MODULES" != "junit-only" ]]; then
            # Set parser project version
            mvn -f tabletest-parser/pom.xml versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q
            # parser's version.tabletest-junit stays unchanged (depends on previously released junit)
          fi

          if [[ "$MODULES" != "parser-only" ]]; then
            # Set junit project version
            mvn -f tabletest-junit/pom.xml versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false -q

            # Update junit's dependency on parser to release version (when releasing both)
            if [[ "$MODULES" == "both" ]]; then
              sed -i "s|<version.tabletest-parser>[^<]*</version.tabletest-parser>|<version.tabletest-parser>$VERSION</version.tabletest-parser>|" tabletest-junit/pom.xml
            fi
            # junit-only: version.tabletest-parser stays unchanged (at current released version)
          fi

          # Update aggregator POM version (sed to avoid reactor cycle)
          sed -i "s|<version>[^<]*-SNAPSHOT</version>|<version>$VERSION</version>|" pom.xml

      - name: Stamp changelogs
        run: |
          TODAY=$(date +%Y-%m-%d)
          MODULES="${{ inputs.modules }}"

          stamp_changelog() {
            local file=$1
            sed -i "s|^## \[Unreleased\]|## [Unreleased]\n\n## [$VERSION] - $TODAY|" "$file"
          }

          stamp_changelog CHANGELOG.md

          if [[ "$MODULES" != "junit-only" ]]; then
            stamp_changelog tabletest-parser/CHANGELOG.md
          fi

      - name: Update README.md
        run: |
          # Update Maven tabletest-junit version (line after artifactId)
          sed -i '/<artifactId>tabletest-junit<\/artifactId>/{n;s|<version>[0-9]\+\.[0-9]\+\.[0-9]\+</version>|<version>'"$VERSION"'</version>|}' README.md
          # Update Gradle tabletest-junit version
          sed -i 's|org.tabletest:tabletest-junit:[0-9]\+\.[0-9]\+\.[0-9]\+|org.tabletest:tabletest-junit:'"$VERSION"'|' README.md

      - name: Commit release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release: prepare $VERSION"

      - name: Deploy parser
        if: inputs.modules != 'junit-only' && !inputs.dry-run
        run: mvn -f tabletest-parser/pom.xml clean deploy -Prelease -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Deploy junit
        if: inputs.modules != 'parser-only' && !inputs.dry-run
        run: mvn -f tabletest-junit/pom.xml clean deploy -Prelease -DskipTests
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Create git tags
        run: |
          if [[ "${{ inputs.modules }}" != "junit-only" ]]; then
            git tag "tabletest-parser-$VERSION"
          fi
          if [[ "${{ inputs.modules }}" != "parser-only" ]]; then
            git tag "tabletest-junit-$VERSION"
          fi

      - name: Create GitHub release
        if: ${{ !inputs.dry-run }}
        run: |
          extract_changelog() {
            local file=$1
            sed -n "/^## \[$VERSION\]/,/^## \[/{/^## \[/!p}" "$file"
          }

          MODULES="${{ inputs.modules }}"

          if [[ "$MODULES" == "both" ]]; then
            BODY=$(extract_changelog CHANGELOG.md)
            gh release create "tabletest-junit-$VERSION" \
              --title "TableTest $VERSION" \
              --notes "$BODY"
          elif [[ "$MODULES" == "parser-only" ]]; then
            BODY=$(extract_changelog tabletest-parser/CHANGELOG.md)
            gh release create "tabletest-parser-$VERSION" \
              --title "TableTest Parser $VERSION" \
              --notes "$BODY"
          else
            BODY=$(extract_changelog CHANGELOG.md)
            gh release create "tabletest-junit-$VERSION" \
              --title "TableTest JUnit $VERSION" \
              --notes "$BODY"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set next SNAPSHOT versions
        run: |
          # Calculate next patch version
          NEXT_PATCH=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          NEXT_SNAPSHOT="${NEXT_PATCH}-SNAPSHOT"
          MODULES="${{ inputs.modules }}"

          # Update POM versions
          if [[ "$MODULES" != "junit-only" ]]; then
            mvn -f tabletest-parser/pom.xml versions:set -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false -q

            # Parser can now depend on the just-released junit version
            if [[ "$MODULES" == "both" ]]; then
              sed -i "s|<version.tabletest-junit>[^<]*</version.tabletest-junit>|<version.tabletest-junit>$VERSION</version.tabletest-junit>|" tabletest-parser/pom.xml
            fi
          fi

          if [[ "$MODULES" != "parser-only" ]]; then
            mvn -f tabletest-junit/pom.xml versions:set -DnewVersion="$NEXT_SNAPSHOT" -DgenerateBackupPoms=false -q

            if [[ "$MODULES" == "both" ]]; then
              sed -i "s|<version.tabletest-parser>[^<]*</version.tabletest-parser>|<version.tabletest-parser>$NEXT_SNAPSHOT</version.tabletest-parser>|" tabletest-junit/pom.xml
            fi
            # junit-only: version.tabletest-parser stays unchanged
          fi

          # Update aggregator POM (sed to avoid reactor cycle)
          sed -i "s|<version>$VERSION</version>|<version>$NEXT_SNAPSHOT</version>|" pom.xml

          # Update test-compatibility.sh default
          sed -i "s|TABLETEST_VERSION=\"[^\"]*\"|TABLETEST_VERSION=\"$NEXT_SNAPSHOT\"|" test-compatibility.sh

          # Update all compatibility test build files
          # Maven pom.xml files
          find compatibility-tests -name 'pom.xml' -exec \
            sed -i "s|<tabletest.version>[^<]*</tabletest.version>|<tabletest.version>$NEXT_SNAPSHOT</tabletest.version>|" {} +

          # Gradle build.gradle files
          find compatibility-tests -name 'build.gradle' -exec \
            sed -i "s|?: '[0-9]\+\.[0-9]\+\.[0-9]\+-SNAPSHOT'|?: '$NEXT_SNAPSHOT'|" {} +

          # Gradle build.gradle.kts files
          find compatibility-tests -name 'build.gradle.kts' -exec \
            sed -i "s|?: \"[0-9]\+\.[0-9]\+\.[0-9]\+-SNAPSHOT\"|?: \"$NEXT_SNAPSHOT\"|" {} +

      - name: Commit next development version
        run: |
          NEXT_PATCH=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3+1}')
          NEXT_SNAPSHOT="${NEXT_PATCH}-SNAPSHOT"
          git add -A
          git commit -m "chore: set next development version $NEXT_SNAPSHOT"

      - name: Push commits and tags
        if: ${{ !inputs.dry-run }}
        run: |
          git push origin main --follow-tags
